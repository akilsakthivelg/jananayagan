<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Piracy Detector</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .box {
            background: #1a1a1a;
            border: 3px solid red;
            padding: 40px;
            max-width: 900px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            border-radius: 12px;
        }

        .badge {
            font-size: 1.2rem;
            color: #bbb;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 4rem;
            color: red;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .warning {
            color: #ff4d4d;
            font-weight: bold;
        }

        .small {
            font-size: 1rem;
            color: #888;
            margin-top: 20px;
        }

        .loader-container {
            margin: 30px auto;
            width: 140px;
            height: 140px;
            position: relative;
        }

        .loader {
            width: 140px;
            height: 140px;
            border: 10px solid #333;
            border-top: 10px solid red;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        .percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: bold;
            color: white;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.4rem;
            }

            p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="badge">MOVIE PIRACY DETECTOR</div>
        <h1>SCANNING DEVICE...</h1>

        <p>
            Checking device for unauthorized download of
            <span class="warning">Jananayagan</span>...
        </p>

        <div class="loader-container">
            <div class="loader"></div>
            <div class="percent" id="percent">0%</div>
        </div>

        <p id="status">Fetching popcorn consumption history...</p>

        <div class="small">
            Relax — this is just a prank.
        </div>
    </div>

    <script>
        let percent = 0;
        const percentText = document.getElementById("percent");
        const statusText = document.getElementById("status");

        const messages = [
            "Checking movie watchlist...",
            "Scanning download folder...",
            "Analyzing Jananayagan file...",
            "Fetching popcorn consumption history...",
            "Verifying piracy detector results..."
        ];

        const interval = setInterval(() => {
            percent++;
            percentText.textContent = percent + "%";

            if (percent % 20 === 0) {
                statusText.textContent = messages[Math.floor(percent / 20) - 1];
            }

            if (percent >= 100) {
                clearInterval(interval);
                statusText.innerHTML =
                    "<span class='warning'>Prank complete. You got caught... by your friends.</span>";
            }
        }, 80);
    </script>
</body>
</html>
